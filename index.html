<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>树莓社活动签到</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      min-height: 100%;
      font-family: -apple-system, "SF Pro", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #F5F6F7;
      color: #1F2329;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    .app {
      display: flex; flex-direction: column; align-items: center;
      min-height: 100dvh;
      min-height: 100svh;
      padding: 32px 20px calc(24px + env(safe-area-inset-bottom));
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    /* Header */
    .header { text-align: center; margin-bottom: 24px; flex-shrink: 0; }
    .header-icon {
      width: 56px; height: 56px; border-radius: 14px;
      margin: 0 auto 12px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .header-icon img { width: 100%; height: 100%; object-fit: cover; }
    .header h1 { font-size: 18px; font-weight: 600; color: #1F2329; letter-spacing: 0.5px; }
    .header .subtitle { font-size: 13px; color: #8F959E; margin-top: 4px; line-height: 1.4; }

    /* Main content area */
    .main-content {
      width: 100%; display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0;
    }

    /* Input fields */
    .input-group { width: 100%; max-width: 360px; margin-bottom: 12px; }
    .activity-input {
      width: 100%; height: 44px; border-radius: 8px;
      border: 1px solid #DEE0E3; background: #FFFFFF; color: #1F2329;
      font-size: 15px; padding: 0 14px; outline: none;
      transition: border-color 200ms, box-shadow 200ms; box-sizing: border-box;
    }
    .activity-input::placeholder { color: #8F959E; }
    .activity-input:focus { border-color: #3370FF; box-shadow: 0 0 0 2px rgba(51,112,255,0.12); }

    /* Scan button */
    .scan-btn {
      position: relative; width: 100%; max-width: 360px; height: 48px;
      border: none; border-radius: 8px; background: #3370FF; color: #fff;
      font-size: 16px; font-weight: 500; cursor: pointer;
      transition: background 200ms, opacity 200ms, transform 100ms;
      -webkit-user-select: none; user-select: none; touch-action: manipulation;
      margin-top: 4px;
    }
    .scan-btn:active:not(:disabled) { background: #2860E6; transform: scale(0.98); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .scan-btn.scanning { background: #3370FF; animation: pulse-shadow 1.5s ease-in-out infinite; }
    @keyframes pulse-shadow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(51,112,255,0.3); }
      50% { box-shadow: 0 0 0 12px rgba(51,112,255,0); }
    }
    .scan-btn.error { background: #FFF; border: 1px solid #F54A4A; color: #F54A4A; }

    /* Status card */
    .status-card {
      width: 100%; max-width: 360px; margin-top: 20px; padding: 20px;
      border-radius: 12px; background: #FFFFFF;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      opacity: 0; transform: translateY(8px) scale(0.97);
      transition: opacity 250ms ease-out, transform 250ms ease-out;
      will-change: opacity, transform; display: none;
    }
    .status-card.visible { display: block; opacity: 1; transform: translateY(0) scale(1); }
    .status-card.success { border-top: 3px solid #34C724; }
    .status-card.fail { border-top: 3px solid #F54A4A; }
    .status-card .card-title {
      font-size: 15px; font-weight: 600; margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .status-card.success .card-title { color: #34C724; }
    .status-card.fail .card-title { color: #F54A4A; }
    .status-card .card-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; font-size: 14px; border-bottom: 1px solid #F0F1F2;
    }
    .status-card .card-row:last-of-type { border-bottom: none; }
    .status-card .card-row .label { color: #8F959E; flex-shrink: 0; }
    .status-card .card-row .value {
      color: #1F2329; font-size: 14px;
      word-break: break-all; text-align: right; max-width: 65%;
    }
    .status-card .retry-btn {
      margin-top: 16px; width: 100%; height: 40px;
      border: 1px solid #DEE0E3; border-radius: 8px;
      background: #FFFFFF; color: #1F2329; font-size: 14px; cursor: pointer;
      transition: background 200ms, border-color 200ms;
    }
    .status-card .retry-btn:active { background: #F5F6F7; }

    /* Footer */
    .footer {
      margin-top: auto; padding-top: 24px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      text-align: center; flex-shrink: 0; width: 100%;
    }
    .footer-banner {
      width: 160px; margin: 0 auto 10px; opacity: 0.6;
      border-radius: 6px; overflow: hidden;
    }
    .footer-banner img { width: 100%; height: auto; display: block; }
    .footer-tip {
      font-size: 12px; color: #8F959E; line-height: 1.6;
    }
    .footer-meta {
      margin-top: 8px;
      font-size: 12px;
      color: #8F959E;
      line-height: 1.5;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; transition: opacity 200ms ease-out;
      pointer-events: none;
    }
    .modal-overlay.visible { opacity: 1; pointer-events: auto; }
    .modal-box {
      width: 300px; background: #FFFFFF; border-radius: 12px;
      padding: 28px 24px 20px; text-align: center;
      transform: scale(0.92); transition: transform 200ms ease-out; will-change: transform;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .modal-overlay.visible .modal-box { transform: scale(1); }
    .modal-box .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 10px; color: #1F2329; }
    .modal-box .modal-msg {
      font-size: 14px; color: #646A73; line-height: 1.5;
      margin-bottom: 20px; word-break: break-word; white-space: pre-line;
    }
    .modal-box .modal-btn {
      width: 100%; height: 44px; border: none; border-radius: 8px;
      background: #3370FF; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer;
    }
    .modal-box .modal-btn:active { background: #2860E6; }

    /* Loading dots */
    .loading-dots { display: inline-flex; gap: 4px; align-items: center; }
    .loading-dots span {
      width: 6px; height: 6px; border-radius: 50%; background: #fff;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* Feishu redirect overlay */
    .feishu-overlay {
      position: fixed; inset: 0; background: #F5F6F7;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 200; padding: 32px 24px; text-align: center;
    }
    .feishu-overlay.visible { display: flex; }
    .feishu-overlay .feishu-icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: #3370FF; display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px; box-shadow: 0 4px 12px rgba(51,112,255,0.25);
    }
    .feishu-overlay .feishu-icon svg { width: 32px; height: 32px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .feishu-overlay .feishu-title { font-size: 18px; font-weight: 600; color: #1F2329; margin-bottom: 12px; }
    .feishu-overlay .feishu-desc { font-size: 14px; color: #646A73; line-height: 1.6; margin-bottom: 8px; }
    .feishu-overlay .feishu-steps {
      font-size: 13px; color: #8F959E; line-height: 1.8;
      background: #FFFFFF; border-radius: 10px; padding: 16px 20px;
      margin: 16px 0 24px; width: 100%; max-width: 300px; text-align: left;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .feishu-overlay .feishu-steps span { color: #3370FF; font-weight: 500; }
    .feishu-overlay .copy-btn {
      width: 100%; max-width: 300px; height: 44px;
      border: 1px solid #DEE0E3; border-radius: 8px;
      background: #FFFFFF; color: #1F2329; font-size: 14px; cursor: pointer;
      transition: background 200ms;
    }
    .feishu-overlay .copy-btn:active { background: #F0F1F2; }
    .feishu-overlay .copy-btn.copied { background: #34C724; color: #fff; border-color: #34C724; }

    /* Register modal */
    .register-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 150; opacity: 0; transition: opacity 200ms ease-out;
      pointer-events: none;
    }
    .register-overlay.visible { opacity: 1; pointer-events: auto; }
    .register-box {
      width: 300px; background: #FFFFFF; border-radius: 12px;
      padding: 28px 24px 20px; text-align: center;
      transform: scale(0.92); transition: transform 200ms ease-out; will-change: transform;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .register-overlay.visible .register-box { transform: scale(1); }
    .register-box .reg-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: #1F2329; }
    .register-box .reg-subtitle { font-size: 13px; color: #8F959E; margin-bottom: 20px; }
    .register-box .reg-input {
      width: 100%; height: 44px; border-radius: 8px;
      border: 1px solid #DEE0E3; background: #FFFFFF; color: #1F2329;
      font-size: 15px; padding: 0 14px; outline: none; text-align: center;
      transition: border-color 200ms, box-shadow 200ms; box-sizing: border-box;
    }
    .register-box .reg-input::placeholder { color: #8F959E; }
    .register-box .reg-input:focus { border-color: #3370FF; box-shadow: 0 0 0 2px rgba(51,112,255,0.12); }
    .register-box .reg-info {
      background: #F5F6F7; border-radius: 8px; padding: 14px 16px;
      margin: 16px 0; text-align: left; font-size: 13px; line-height: 1.8; color: #1F2329;
    }
    .register-box .reg-info .reg-label { color: #8F959E; }
    .register-box .reg-error { font-size: 13px; color: #F54A4A; margin-top: 8px; min-height: 20px; }
    .register-box .reg-btn {
      width: 100%; height: 44px; border: none; border-radius: 8px;
      background: #3370FF; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer;
      margin-top: 8px;
    }
    .register-box .reg-btn:active { background: #2860E6; }
    .register-box .reg-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .register-box .reg-btn.secondary {
      background: #FFFFFF; color: #1F2329; border: 1px solid #DEE0E3; margin-top: 8px;
    }
    .register-box .reg-btn.secondary:active { background: #F5F6F7; }
    @keyframes dot-bounce {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.1); }
    }

    /* QR Scanner */
    .qr-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center;
      z-index: 300; opacity: 0; transition: opacity 200ms ease-out;
      pointer-events: none;
    }
    .qr-overlay.visible { opacity: 1; pointer-events: auto; }
    .qr-box {
      width: 320px; background: #FFFFFF; border-radius: 16px;
      overflow: hidden; box-shadow: 0 12px 48px rgba(0,0,0,0.2);
    }
    .qr-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; background: #F5F6F7; border-bottom: 1px solid #E5E6E7;
    }
    .qr-title { font-size: 17px; font-weight: 600; color: #1F2329; }
    .qr-close-btn {
      width: 32px; height: 32px; border: none; border-radius: 50%;
      background: #DEE0E3; color: #646A73; font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .qr-close-btn:active { background: #C4C6CA; }
    .qr-video-container {
      position: relative; width: 100%; height: 280px;
      background: #000; overflow: hidden;
    }
    #qrVideo {
      width: 100%; height: 100%; object-fit: cover;
    }
    .qr-torch-btn {
      position: absolute; top: 16px; right: 16px;
      min-width: 96px; height: 36px; padding: 0 12px;
      border: none; border-radius: 18px;
      background: rgba(0,0,0,0.55); color: #fff;
      font-size: 13px; font-weight: 600; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }
    .qr-torch-btn.active {
      background: rgba(52,199,36,0.88);
    }
    .qr-torch-btn:disabled {
      opacity: 0.6; cursor: default;
    }
    .qr-scan-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: #34C724; box-shadow: 0 0 8px #34C724;
      animation: scan-move 2s linear infinite;
    }
    @keyframes scan-move {
      0% { top: 20%; }
      100% { top: 80%; }
    }
    .qr-corner {
      position: absolute; width: 24px; height: 24px;
      border: 3px solid #34C724;
    }
    .qr-corner.tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
    .qr-corner.tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
    .qr-corner.bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
    .qr-corner.br { bottom: 30px; right: 30px; border-left: none; border-top: none; }
    .qr-hint {
      position: absolute; bottom: 16px; left: 0; right: 0;
      text-align: center; font-size: 14px; color: rgba(255,255,255,0.8);
    }
    .qr-loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6);
    }
    .qr-spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #34C724;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .qr-loading p {
      color: #fff; font-size: 14px; margin-top: 12px;
    }
    .qr-permission-tip {
      padding: 24px; text-align: center;
    }
    .qr-permission-tip p { font-size: 15px; color: #646A73; margin-bottom: 12px; }
    .qr-permission-btn {
      width: 100%; height: 44px; border: none; border-radius: 8px;
      background: #34C724; color: #fff; font-size: 15px; font-weight: 500;
      cursor: pointer;
    }
    .qr-permission-btn:active { background: #28A020; }
    .qr-error {
      padding: 12px 20px; text-align: center;
      font-size: 13px; color: #F54A4A; min-height: 40px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-icon">
        <img src="https://szzxshumei.com/wp-content/uploads/2026/04/0000102a-58bd-79f7-4f11-3f504ceaf79f.png" alt="树莓社" />
      </div>
      <h1>树莓社活动签到</h1>
      <p class="subtitle" id="subtitle">正在初始化...</p>
    </div>
    <div class="main-content">
      <div class="input-group">
        <input class="activity-input" id="activityInput" type="text" placeholder="输入活动名称（如：周三例会）" />
      </div>
      <div class="input-group">
        <input class="activity-input" id="durationInput" type="number" step="0.5" min="0" placeholder="活动时长（小时）" />
      </div>
      <button class="scan-btn" id="scanBtn" disabled>开始刷卡签到</button>
      <button class="scan-btn qr-btn" id="qrBtn" onclick="unlockAudioContext(); startQRScan()" style="margin-top: 10px; background: #34C724;">扫码签到</button>
      <div class="status-card" id="statusCard">
        <div class="card-title" id="cardTitle"></div>
        <div id="cardContent"></div>
      </div>
    </div>
    <div class="footer">
      <div class="footer-banner">
        <img src="https://szzxshumei.com/wp-content/uploads/2025/01/banner-dark.png" alt="树莓社" />
      </div>
      <div class="footer-tip" id="footerTip">需要 Android Chrome 浏览器支持 Web NFC<br/>iOS 设备暂不支持</div>
      <div class="footer-meta" id="footerMeta">Version 1.0.1 · 更新 2026-07-23</div>
      <div class="footer-clear" style="margin-top:12px;font-size:12px;color:#8F959E;cursor:pointer;display:flex;gap:16px;justify-content:center;">
      <span onclick="viewLocalCache()" style="text-decoration:underline;">查看本地缓存</span>
      <span onclick="clearLocalCache()" style="text-decoration:underline;">清除本地卡号缓存</span>
    </div>
    </div>
  </div>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle">提示</div>
      <div class="modal-msg" id="modalMsg"></div>
      <button class="modal-btn" id="modalBtn" onclick="hideModal()">确定</button>
    </div>
  </div>
  <div class="feishu-overlay" id="feishuOverlay">
    <div class="feishu-icon">
      <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </div>
    <div class="feishu-title">请在系统浏览器中打开</div>
    <div class="feishu-desc">飞书内置浏览器无法访问摄像头<br/>请在系统浏览器中打开后使用扫码签到</div>
    <div class="feishu-steps">
      1. 点击右上角 <span>「···」</span><br/>
      2. 选择 <span>「在浏览器中打开」</span><br/>
      3. 使用 Android Chrome 浏览器访问
    </div>
    <button class="copy-btn" id="copyUrlBtn" onclick="copyPageUrl()">复制链接地址</button>
  </div>
  <div class="register-overlay" id="registerOverlay">
    <div class="register-box">
      <div class="reg-title" id="regTitle">首次刷卡登记</div>
      <div class="reg-subtitle" id="regSubtitle">请输入你的姓名，关联社员信息</div>
      <div id="regContent">
        <input class="reg-input" id="regNameInput" type="text" placeholder="输入姓名" autocomplete="off" />
        <div class="reg-error" id="regError"></div>
        <button class="reg-btn" id="regSearchBtn" onclick="searchMember()">查找社员</button>
      </div>
      <div id="regConfirmContent" style="display:none;">
        <div class="reg-info" id="regMemberInfo"></div>
        <button class="reg-btn" id="regConfirmBtn" onclick="confirmRegistration()">确认关联</button>
        <button class="reg-btn secondary" onclick="cancelRegistration()">重新输入</button>
      </div>
    </div>
  </div>

  <!-- QR Scanner Overlay -->
  <div class="qr-overlay" id="qrOverlay">
    <div class="qr-box">
      <div class="qr-header">
        <div class="qr-title">扫码签到</div>
        <button class="qr-close-btn" onclick="stopQRScan()">×</button>
      </div>
      <div class="qr-video-container">
        <video id="qrVideo" autoplay playsinline muted></video>
        <canvas id="qrCanvas" style="display:none;"></canvas>
        <button class="qr-torch-btn" id="qrTorchBtn" type="button" onclick="toggleQRTorch()">打开手电筒</button>
        <div class="qr-scan-line"></div>
        <div class="qr-corner tl"></div>
        <div class="qr-corner tr"></div>
        <div class="qr-corner bl"></div>
        <div class="qr-corner br"></div>
        <div class="qr-hint">将条码/二维码对准框内</div>
        <div class="qr-loading" id="qrLoading" style="display:none;">
          <div class="qr-spinner"></div>
          <p>正在启动摄像头...</p>
        </div>
      </div>
      <div class="qr-permission-tip" id="qrPermissionTip" style="display:none;">
        <p>需要摄像头权限</p>
        <p style="font-size:12px; color:#909399; margin-top:4px;">请允许浏览器访问摄像头以进行扫码</p>
        <button class="qr-permission-btn" onclick="requestCameraPermission()">允许访问摄像头</button>
      </div>
      <div class="qr-error" id="qrError"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@latest/umd/index.min.js"></script>
  <script src="./public/members.js?v=2026072301"></script>

  function fallbackCopy(text) {

    ta.value = text;

    document.body.appendChild(ta);
    ta.select();

    document.body.removeChild(ta);

  function searchMember() {
    var name = document.getElementById("regNameInput").value.trim();
    if (!name) {
      document.getElementById("regError").textContent = "请输入姓名";
      return;
    }

    // 在 MEMBER_INFO 中查找（支持模糊匹配）
    var matched = null;
    var matchedName = "";
    if (typeof MEMBER_INFO !== "undefined") {
      for (var key in MEMBER_INFO) {
        if (key.indexOf(name) !== -1) {
          matched = MEMBER_INFO[key];
          matchedName = key;
          break;
        }
      }
    }

    if (!matched) {
      document.getElementById("regError").textContent = "未找到该社员，请检查姓名";
      return;
    }
    
        // ★ 新增：保存精确匹配到的姓名
    pendingMatchedName = matchedName;

    // 解析社员信息
    var infoText = matched;
    var lines = infoText.split("\n");
    var memberId = "", department = "", className = "";
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (line.indexOf("登记序号") === 0) {
        var no = line.split(/[：:]/)[1];
        if (no) memberId = no.trim();
      } else if (line.indexOf("所属部门") === 0) {
        var dept = line.split(/[：:]/)[1];
        if (dept) department = dept.trim();
      } else if (line.indexOf("班级") === 0) {
        var cls = line.split(/[：:]/)[1];
        if (cls) className = cls.trim();
      }
    }

    // 显示确认信息

    document.getElementById("regConfirmContent").style.display = "block";
    document.getElementById("regTitle").textContent = "确认社员信息";
    document.getElementById("regSubtitle").textContent = "卡号 " + pendingUid + " 将关联到以下社员";

    var infoHtml = '<div><span class="reg-label">姓名：</span>' + matchedName + '</div>';

  function checkWebNFCSupport() {
    if (!("NDEFReader" in window)) {
      return false;
    }
    // Web NFC 要求安全上下文 (HTTPS)
    if (!window.isSecureContext) {

      return false;
    }
    return true;

  // ============================================================
  // [模块] NFC 读卡（Web NFC API）
  // ============================================================
  function startScan() {
    if (!tryAcquire()) return;
    if (state.isScanning) return;

    // 隐藏上次的结果卡片
    elStatusCard.className = "status-card";

    try {
      console.log("[NFC] 创建 NDEFReader");
      state.ndefReader = new NDEFReader();

      setButtonScanning();
      console.log("[NFC] 开始扫描...");

      state.ndefReader.scan().then(function () {
        console.log("[NFC] 扫描已启动，等待贴卡");

        state.ndefReader.onreading = function (event) {
          console.log("[NFC] 检测到卡片!");
          console.log("[NFC] serialNumber:", event.serialNumber);
          console.log("[NFC] message:", JSON.stringify(event.message));

          // 提取卡号：serialNumber 已经是十六进制字符串（冒号分隔）
          var uid = event.serialNumber || "UNKNOWN";
          // 统一格式：去掉冒号，转大写
          var uidClean = uid.replace(/:/g, "").toUpperCase();
          state.lastUid = uidClean;

          console.log("[NFC] 卡号:", uidClean);

          // 停止扫描
          stopScan();

          // 查找社员信息（优先级：localStorage > CARD_MEMBERS）
          var extra = {};
          var memberName = "";
          var localMap = getLocalCardMap();
          if (localMap[uidClean]) {
            memberName = localMap[uidClean];
            console.log("[NFC] 本地缓存匹配:", memberName);
          } else if (typeof CARD_MEMBERS !== "undefined" && CARD_MEMBERS[uidClean]) {
            memberName = CARD_MEMBERS[uidClean];
            console.log("[NFC] 预置映射匹配:", memberName);
          }

          if (memberName) {
            // 查找详细信息中的社员号、部门和班级
            if (typeof MEMBER_INFO !== "undefined" && MEMBER_INFO[memberName]) {
              var infoText = MEMBER_INFO[memberName];
              var lines = infoText.split("\n");
              for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line.indexOf("登记序号") === 0) {
                  var no = line.split(/[：:]/)[1];
                  if (no) extra["社员号"] = no.trim();
                } else if (line.indexOf("所属部门") === 0) {
                  var dept = line.split(/[：:]/)[1];
                  if (dept) extra["部门"] = dept.trim();
                } else if (line.indexOf("班级") === 0) {
                  var cls = line.split(/[：:]/)[1];
                  if (cls) extra["班级"] = cls.trim();
                }
              }
            }
            extra["姓名"] = memberName;
            console.log("[NFC] 匹配社员:", memberName, extra);

            // 展示结果并推送
            var activity = document.getElementById("activityInput").value.trim();
            var durationVal = document.getElementById("durationInput").value.trim();
            var duration = durationVal ? durationVal + "小时" : "";
            if (activity) extra["活动"] = activity;
            if (duration) extra["时长"] = duration;
            showSuccessCard(uidClean, extra, "nfc");
            setButtonIdle();
    //        submitToWebhook(uidClean, memberName, extra);
            sendToFeishuBot(uidClean, memberName, extra);
            submitToWps(uidClean, memberName, extra);
          } else {
            // 未匹配到社员，弹出登记窗口
            console.log("[NFC] 未匹配到社员，弹出登记窗口");
            setButtonIdle();
            showRegisterModal(uidClean, "nfc");
          }
        };

        state.ndefReader.onreadingerror = function (error) {
          console.log("[NFC] 读卡错误:", error.message || error);
          // 读卡错误不中断扫描，用户可以再次贴卡
        };

      }).catch(function (err) {
        console.error("[NFC] startDiscovery 失败:", err.message || err);
        setButtonError("重新刷卡");

        var msg = "NFC启动失败";
        if (err.name === "NotAllowedError") {
          msg = "NFC权限被拒绝，请在浏览器设置中允许NFC";
        } else if (err.name === "NotSupportedError") {
          msg = "设备不支持NFC";
        } else if (err.name === "NotFoundError") {
          msg = "未找到NFC适配器";
        } else if (err.name === "AbortError") {
          msg = "扫描被中止";
        } else {
          msg = "NFC错误: " + (err.message || err.name || "未知");
        }
        showFailCard(msg);
      });

    } catch (err) {
      console.error("[NFC] 创建 NDEFReader 异常:", err);
      setButtonError("重新刷卡");
      showFailCard("NFC初始化失败: " + (err.message || "未知错误"));
    }
  }

  function stopScan() {
    if (state.ndefReader) {
      try {
        // abort() 停止扫描
        if (typeof state.ndefReader.abort === "function") {
          state.ndefReader.abort();
        }
      } catch (e) {
        console.log("[NFC] stopScan:", e.message);
      }
      state.ndefReader.onreading = null;
      state.ndefReader.onreadingerror = null;
      state.ndefReader = null;
    }
    state.isScanning = false;
  }

  function submitToWps(uid, memberName, extra) {
    if (!WPS_WEBHOOK) return;

    var now = new Date();
    var pad = function (n) { return n < 10 ? "0" + n : "" + n; };
    var timeStr = now.getFullYear() + "-" + pad(now.getMonth() + 1) + "-" + pad(now.getDate()) +
      " " + pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());

    var payload = {
      "cardUid": uid,
      "timestamp": timeStr,
      "userName": memberName || "",
      "department": (extra && extra["部门"]) || "",
      "className": (extra && extra["班级"]) || "",
      "activity": (extra && extra["活动"]) || "",
      "duration": (extra && extra["时长"]) || ""
    };

    fetch(WPS_WEBHOOK, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    }).then(function (res) {
      console.log("[WPS] 响应:", res.status);
    }).catch(function (err) {
      console.error("[WPS] 推送失败:", err);
    });
  }

  function stopQRScan() {
    qrState.isScanning = false;
    clearQRCompatibilityTimer();
    disableQRTorch();
    
    var overlay = document.getElementById("qrOverlay");
    overlay.classList.remove("visible");
    setTimeout(function() { overlay.style.display = "none"; }, 200);
    
    if (qrState.controls) {
      try { qrState.controls.stop(); } catch(e) {}
      qrState.controls = null;
    }
    
    if (qrState.reader) {
      try { qrState.reader.reset(); } catch(e) {}
      qrState.reader = null;
    }
    
    if (qrState.video) {
      qrState.video.srcObject = null;
    }
     
    qrState.torchAvailable = false;
    updateQRTorchButton();
  }

  function clearQRCompatibilityTimer() {
    if (qrState.compatibilityTimer) {
      clearTimeout(qrState.compatibilityTimer);
      qrState.compatibilityTimer = null;
    }
  }

  function getCompatibleQRFormats() {
    return [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.EAN_13,
    ];
  }

  function createQRReader(formats) {
    var hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
    return new ZXing.BrowserMultiFormatReader(hints);
  }

  function getQRConstraints() {
    return {
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1280 },
        height: { ideal: 720 },
        frameRate: { ideal: 24, max: 30 }
      },
      audio: false
    };
  }

  function stopQRDecoder() {
    clearQRCompatibilityTimer();
    if (qrState.controls) {
      try { qrState.controls.stop(); } catch (e) {}
      qrState.controls = null;
    }
    if (qrState.reader) {
      try { qrState.reader.reset(); } catch (e) {}
      qrState.reader = null;
    }
  }
  function getQRVideoTrack() {
    if (!qrState.video || !qrState.video.srcObject || typeof qrState.video.srcObject.getVideoTracks !== "function") {
      return null;
    }
    var tracks = qrState.video.srcObject.getVideoTracks();
    return tracks && tracks[0] ? tracks[0] : null;
  }
 
  function updateQRTorchButton() {
    var btn = document.getElementById("qrTorchBtn");
    if (!btn) return;
    btn.style.display = (qrState.isScanning && qrState.torchAvailable) ? "flex" : "none";
    btn.textContent = qrState.torchEnabled ? "关闭手电筒" : "打开手电筒";
    if (qrState.torchEnabled) {
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  }
 
  function refreshQRTorchAvailability() {
    var track = getQRVideoTrack();
    var caps = track && typeof track.getCapabilities === "function" ? track.getCapabilities() : null;
    qrState.torchAvailable = !!(caps && caps.torch);
    updateQRTorchButton();
 
    if (qrState.torchAvailable && qrState.torchEnabled) {
      applyQRTorch(true).catch(function (err) {
        console.warn("[QR] 恢复手电筒状态失败:", err);
      });
    }
  }
 
  function scheduleQRTorchRefresh() {
    refreshQRTorchAvailability();
    setTimeout(refreshQRTorchAvailability, 200);
    setTimeout(refreshQRTorchAvailability, 600);
  }

  function applyQRTorch(enabled) {
    var track = getQRVideoTrack();
    if (!track || typeof track.applyConstraints !== "function") {
      return Promise.reject(new Error("当前摄像头轨道不支持手电筒控制"));
    }
 
    var caps = typeof track.getCapabilities === "function" ? track.getCapabilities() : null;
    if (!caps || !caps.torch) {
      qrState.torchAvailable = false;
      updateQRTorchButton();
      return Promise.reject(new Error("当前设备不支持手电筒"));
    }
 
    return track.applyConstraints({ advanced: [{ torch: enabled }] }).then(function () {
      qrState.torchAvailable = true;
      qrState.torchEnabled = enabled;
      updateQRTorchButton();
    });
  }
 
  function disableQRTorch() {
    var wasEnabled = qrState.torchEnabled;
    qrState.torchEnabled = false;
    updateQRTorchButton();
    if (!wasEnabled) return;
    applyQRTorch(false).catch(function (err) {
      console.warn("[QR] 关闭手电筒失败:", err);
    });
  }
 
  function toggleQRTorch() {
    if (!qrState.isScanning) return;
    if (!qrState.torchAvailable) {
      document.getElementById("qrError").textContent = "当前设备或浏览器不支持手电筒";
      return;
    }
 
    document.getElementById("qrError").textContent = "";
    applyQRTorch(!qrState.torchEnabled).catch(function (err) {
      console.warn("[QR] 切换手电筒失败:", err);
      document.getElementById("qrError").textContent = "手电筒切换失败，请尝试重新打开扫码";
    });
  }
 
   function startQRDecode(useDefaultCamera, formats, sessionId, modeLabel) {
    stopQRDecoder();
    qrState.reader = createQRReader(formats);

    var decodeCallback = function(result, err, controls) {
      if (sessionId !== qrState.sessionId || !qrState.isScanning) return;
      if (result) {
        console.log("[QR] 扫描成功:", result.getText());
        console.log("[QR] 条码类型:", result.getBarcodeFormat());
        qrState.controls = controls;
        handleQRCode(result.getText());
      }
    };

    var decodePromise = useDefaultCamera
      ? qrState.reader.decodeFromVideoDevice(undefined, qrState.video, decodeCallback)
      : qrState.reader.decodeFromConstraints(getQRConstraints(), qrState.video, decodeCallback);

    return decodePromise.then(function(controls) {
      if (sessionId !== qrState.sessionId || !qrState.isScanning) {
        try { controls.stop(); } catch (e) {}
        return;
      }
      qrState.controls = controls;
      document.getElementById("qrLoading").style.display = "none";
      console.log("[QR] " + modeLabel + "已启动");
      scheduleQRTorchRefresh();
    });
  }

  function handleQRStartFailure(err) {
    console.error("[QR] 摄像头访问失败:", err);
    qrState.isScanning = false;
    document.getElementById("qrLoading").style.display = "none";
    
    var ua = navigator.userAgent.toLowerCase();
    var isFeishu = /feishu|lark/.test(ua);
    
    if (isFeishu) {
      // 飞书浏览器摄像头不可用，显示跳转提示
      stopQRScan();
      document.getElementById("feishuOverlay").classList.add("visible");
    } else if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
      showPermissionDenied();
    } else if (err.name === "NotFoundError" || err.name === "DevicesNotFoundError") {
      document.getElementById("qrError").textContent = "未检测到摄像头";
    } else if (err.name === "NotReadableError") {
      document.getElementById("qrError").textContent = "摄像头被其他应用占用";
    } else if (err.name === "SecurityError") {
      document.getElementById("qrError").textContent = "安全限制：需要HTTPS环境";
    } else {
      document.getElementById("qrError").textContent = "无法访问摄像头: " + (err.message || err.name);
    }
  }

  function startCamera() {
    var sessionId = ++qrState.sessionId;
    startQRDecode(false, getCompatibleQRFormats(), sessionId, "稳定模式（全格式）")
      .catch(function(err) {
        console.warn("[QR] 后置摄像头失败，尝试默认摄像头:", err);
        return startQRDecode(true, getCompatibleQRFormats(), sessionId, "稳定模式（默认摄像头）");
      })
      .catch(function(err) {
        handleQRStartFailure(err);
      });
  }

  function showPermissionDenied() {
    document.getElementById("qrPermissionTip").style.display = "block";
    document.getElementById("qrError").textContent = "";
  }

  function requestCameraPermission() {
    document.getElementById("qrPermissionTip").style.display = "none";
    document.getElementById("qrError").textContent = "";
    document.getElementById("qrLoading").style.display = "flex";
    qrState.isScanning = true;
    startCamera();
  }

  var audioCtx = null;
  var audioUnlocked = false;

  function unlockAudioContext() {
    if (audioUnlocked) return;
    try {
      if (!audioCtx) {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        audioCtx = new AC();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume().catch(function () {});
      }
      audioUnlocked = true;
    } catch (e) {
      console.log("[Beep] 音频解锁失败:", e);
    }
  }

  function playBeep() {
    try {
      unlockAudioContext();
      if (!audioCtx) return;
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      var now = audioCtx.currentTime;

      // 第一段：高频短滴（模拟 iOS "ding" 音头）
      var osc1 = audioCtx.createOscillator();
      var gain1 = audioCtx.createGain();
      osc1.type = "sine";
      osc1.frequency.setValueAtTime(1900, now);
      osc1.frequency.exponentialRampToValueAtTime(1600, now + 0.08);
      gain1.gain.setValueAtTime(0.4, now);
      gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
      osc1.connect(gain1);
      gain1.connect(audioCtx.destination);
      osc1.start(now);
      osc1.stop(now + 0.12);

      // 第二段：低频共鸣（模拟 iOS 提示音的温润感）
      var osc2 = audioCtx.createOscillator();
      var gain2 = audioCtx.createGain();
      osc2.type = "triangle";
      osc2.frequency.setValueAtTime(1200, now + 0.02);
      gain2.gain.setValueAtTime(0.15, now + 0.02);
      gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start(now + 0.02);
      osc2.stop(now + 0.2);
    } catch (e) {
      console.log("[Beep] 播放失败:", e);
    }
  }

  function handleQRCode(data) {
    stopQRScan();
    
    var uid = data.trim().toUpperCase().replace(/:/g, "");
    
    if (!uid) {
      showModal("扫码失败", "未能识别条码内容");
      return;
    }
    
    processQRResult(uid);
  }

  function processQRResult(uid) {
    elStatusCard.className = "status-card";
    
    var extra = {};
    var memberName = "";
    var localMap = getLocalCardMap();
    
    if (localMap[uid]) {
      memberName = localMap[uid];
      console.log("[QR] 本地缓存匹配:", memberName);
    } else if (typeof BARCODE_MEMBERS !== "undefined" && BARCODE_MEMBERS[uid]) {
      memberName = BARCODE_MEMBERS[uid];
      console.log("[QR] 条码映射匹配:", memberName);
    } else if (typeof CARD_MEMBERS !== "undefined" && CARD_MEMBERS[uid]) {
      memberName = CARD_MEMBERS[uid];
      console.log("[QR] 卡号映射匹配:", memberName);
    }
    
    if (memberName) {
      if (typeof MEMBER_INFO !== "undefined" && MEMBER_INFO[memberName]) {
        var infoText = MEMBER_INFO[memberName];
        var lines = infoText.split("\n");
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (line.indexOf("登记序号") === 0) {
            var no = line.split(/[：:]/)[1];
            if (no) extra["社员号"] = no.trim();
          } else if (line.indexOf("所属部门") === 0) {
            var dept = line.split(/[：:]/)[1];
            if (dept) extra["部门"] = dept.trim();
          } else if (line.indexOf("班级") === 0) {
            var cls = line.split(/[：:]/)[1];
            if (cls) extra["班级"] = cls.trim();
          }
        }
      }
      extra["姓名"] = memberName;
      
      var activity = document.getElementById("activityInput").value.trim();
      var durationVal = document.getElementById("durationInput").value.trim();
      var duration = durationVal ? durationVal + "小时" : "";
      if (activity) extra["活动"] = activity;
      if (duration) extra["时长"] = duration;
      
      var displayUid = uid;
      if (typeof BARCODE_READABLE !== "undefined" && BARCODE_READABLE[uid]) {
        displayUid = BARCODE_READABLE[uid];
      }
      
      showSuccessCard(displayUid, extra);
      playBeep();
      sendToFeishuBot(uid, memberName, extra);
      submitToWps(uid, memberName, extra);
    } else {
      pendingUid = uid;
      showRegisterModal(uid);
    }
  }

  // ============================================================
  // [模块] 初始化流程
  // ============================================================
  function init() {
    console.log("[Init] 开始初始化...");

    document.addEventListener("touchstart", unlockAudioContext, { once: true });
    document.addEventListener("click", unlockAudioContext, { once: true });

    var ua = navigator.userAgent.toLowerCase();
    var isFeishu = /feishu|lark/.test(ua);
    var isIOS = /iphone|ipad|ipod/.test(ua);

    renderFooterMeta();

    console.log("[Init] Web NFC 支持:", "NDEFReader" in window);
    console.log("[Init] 安全上下文:", window.isSecureContext);
    console.log("[Init] 飞书浏览器:", isFeishu);

    if (!checkWebNFCSupport()) {
      // Web NFC 不可用
      console.log("[Init] Web NFC 不可用");
      btnScan.disabled = true;
      btnScan.textContent = "NFC不可用";

      if (isFeishu) {
        // 飞书内置浏览器：NFC 不可用，但可以扫码
        elSubtitle.textContent = "请点击下方扫码签到";
        document.getElementById("footerTip").innerHTML = "飞书浏览器不支持 NFC 刷卡<br/>请使用「扫码签到」功能";
        showModal("提示", "飞书浏览器不支持 NFC 刷卡\n\n请点击绿色「扫码签到」按钮\n通过扫描条形码完成签到");
      } else if (isIOS) {
        elSubtitle.textContent = "请使用扫码签到";
        document.getElementById("footerTip").innerHTML = "iOS 不支持 NFC 刷卡<br/>请使用「扫码签到」功能";
      } else {
        elSubtitle.textContent = "当前设备/浏览器不支持 NFC";
        var isSafari = /safari/.test(ua) && !/chrome/.test(ua);
        if (isSafari) {
          document.getElementById("footerTip").innerHTML = "Safari 不支持 NFC<br/>请使用 Chrome 或扫码签到";
        } else if (!window.isSecureContext) {
          document.getElementById("footerTip").innerHTML = "需要 HTTPS 安全连接";
        } else {
          document.getElementById("footerTip").innerHTML = "需要 Android Chrome 89+<br/>或使用扫码签到";
        }
      }
      return;
    }

    // Web NFC 可用
    console.log("[Init] Web NFC 可用，就绪");
    elSubtitle.textContent = COZE_WEBHOOK ? "就绪，请点击下方按钮刷卡" : "就绪（仅读卡模式）";
    btnScan.disabled = false;
  }

  // 页面加载后初始化
  init();
  </script>
